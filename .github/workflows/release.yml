name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute new version
        id: version
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          LATEST=${LATEST:-v0.0.0}

          MAJOR=$(echo "${LATEST#v}" | cut -d. -f1)
          MINOR=$(echo "${LATEST#v}" | cut -d. -f2)
          PATCH=$(echo "${LATEST#v}" | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW"          >> $GITHUB_OUTPUT
          echo "previous=$LATEST"  >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS="${{ steps.version.outputs.previous }}"

          if [ "$PREVIOUS" = "v0.0.0" ]; then
            git log --pretty=format:"- %s" --no-merges > changelog.md
          else
            git log "${PREVIOUS}..HEAD" --pretty=format:"- %s" --no-merges > changelog.md
          fi

          cat changelog.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            dist/mass-coverwall-card.js \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file changelog.md
